<!DOCTYPE html>
<html lang="de">

	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Interaktives Pokedex mit Suche, Sortierung, Favoriten und Detailansicht auf Basis der PokeAPI." />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
		<link href="https://fonts.cdnfonts.com/css/pokemon-solid" rel="stylesheet" />

		<title>Pokedex</title>
		<link rel="icon" type="image/x-icon" href="./assets/img/pokeball.png" />
		<link rel="stylesheet" href="./style/header.css">
		<link rel="stylesheet" href="./style/loader.css" />
		<link rel="stylesheet" href="./style/style.css" />
		<link rel="stylesheet" href="./style/pokedex.css" />
		<link rel="stylesheet" href="./style/pokemonCart.css" />
		<link rel="stylesheet" href="./style/colors.css" />
		<link rel="stylesheet" href="./style/button.css" />
		<link rel="stylesheet" href="./style/helper.css" />
		<link rel="stylesheet" href="./style/footer.css">

		<script src="./js/i18n.js" defer></script>
		<script src="./js/template.js" defer></script>
		<script src="./js/loader.js" defer></script>
		<script src="./js/script.js" defer></script>
		<script src="./js/search.js" defer></script>
		<script src="./js/pokemonCart.js" defer></script>
		<script src="./js/switchtypes.js" defer></script>
		<script src="./js/pokeSounds.js" defer></script>
		<script src="./js/favorites.js" defer></script>
		<script src="./js/sortBy.js" defer></script>

	</head>

	<body id="body" onload="init()">
		<noscript>Diese App benoetigt JavaScript, um Pokemon-Daten zu laden.</noscript>
		<!-- loader -->
		<div id="page-loader" class="page-loader">
			<div class="update-loader">
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				<span></span>
			</div>
			<h2 id="loader-text">Pokemon werden geladen ...</h2>
		</div>

		<header id="header" class="header">
			<img class="header__logo" src="./assets/img/logo.png" alt="Pokemon Logo" onclick="sortById()" aria-label="Sortierung nach ID" />
			<nav class="nav">
				<ul class="nav__list">
					<li class="nav__list-item">
						<label class="sr-only" for="search">Pokemon suchen</label>
						<input class="nav__search" placeholder="Pokemon suchen" type="search" name="search" id="search" />
					</li>
					<li class="nav__list-item">
						<div id="select-field" class="select__container">
							<label class="sr-only" for="sort-select">Sortierung</label>
							<select class="nav__select" name="sort" id="sort-select">
								<option value="id">Sortieren: ID</option>
								<option value="name">Sortieren: Name</option>
							</select>
						</div>
					</li>
					<li class="nav__list-item">
						<div class="select__container select__container--lang">
							<label class="sr-only" for="lang-select">Sprache</label>
							<select class="nav__select" name="language" id="lang-select">
								<option value="de">DE</option>
								<option value="en">EN</option>
							</select>
						</div>
					</li>
					<li class="nav__list-item">
						<button id="fav-link" class="link pokefont" type="button" aria-label="Favoriten anzeigen">Favoriten</button>
					</li>
				</ul>
			</nav>
		</header>

		<main>
			<div id="pokedex" class="pokedex d-none"></div>
			<div id="mainframe" class="mainframe d-none"></div>
		</main>

		<footer id="footer" class="footer">
			<button id="morePokemonsBtn" class="link pokefont" type="button" onclick="showMorePokemons()" aria-label="Weitere Pokemon laden">
				+ Pokemon laden
			</button>
			<button id="allPokemonsBtn" class="link pokefont" type="button" onclick="showAllPokemons()" aria-label="Alle Pokemon laden">
				Alle 151 Pokemon
			</button>
		</footer>
	</body>

</html>
